name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright scry/

      - name: Pytest
        # typer/rich force ANSI output when GITHUB_ACTIONS is set, which breaks
        # CLI help-text assertions; a dumb terminal keeps captured output plain.
        env:
          TERM: dumb
        run: uv run pytest -q
