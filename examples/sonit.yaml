name: sonit
root: ./path/to/your/app  # set to the project you want scry to scan
platform: shopify

# Inventory extraction
api_version_source: "shopify.app.toml:webhooks.api_version"
source_patterns:
  - "app/**/*.ts"
  - "app/**/*.tsx"
graphql_tag: "#graphql"
dependency_prefixes:
  - "@shopify/"
webhook_config_path: "shopify.app.toml"

# Severity overrides
escalation_rules: []

# Collect settings
changelog_rss_url: "https://shopify.dev/changelog/feed.xml"
design_system_urls:
  - "https://polaris.shopify.com/whats-new"

# Report output
report_dir: "docs/api-changes"
